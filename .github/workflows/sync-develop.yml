name: Sync develop after merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-develop:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop-signed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync develop with main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Removing branch protection on develop..."
          gh api repos/mendsec/catnet-core/branches/develop/protection --method DELETE
          echo "Force-pushing develop to main ($MAIN_SHA)..."
          git push origin origin/main:refs/heads/develop --force
          echo "Restoring branch protection on develop..."
          gh api repos/mendsec/catnet-core/branches/develop/protection --method PUT \
            --field required_status_checks=null \
            --field enforce_admins=false \
            --field required_pull_request_reviews=null \
            --field restrictions=null \
            --field required_linear_history=false \
            --field allow_force_pushes=false \
            --field allow_deletions=false \
            --field block_creations=false \
            --field required_conversation_resolution=false \
            --field lock_branch=false \
            --field allow_fork_syncing=true
          echo "develop synced to main ($MAIN_SHA)"