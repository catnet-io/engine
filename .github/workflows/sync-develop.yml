name: Sync develop after merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-develop:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop-signed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync develop with main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Temporarily allowing force pushes on develop..."
          gh api repos/mendsec/catnet-core/branches/develop/protection \
            --method PATCH \
            --field allow_force_pushes=true 2>/dev/null || \
          gh api repos/mendsec/catnet-core/branches/develop/protection \
            --method PUT \
            --field allow_force_pushes=true 2>/dev/null || \
          echo "Warning: could not update branch protection"
          echo "Updating develop ref to main ($MAIN_SHA)..."
          gh api repos/mendsec/catnet-core/git/refs/heads/develop \
            --method PATCH \
            --field sha="$MAIN_SHA" \
            --field force=true
          echo "Restoring branch protection (force pushes disabled)..."
          gh api repos/mendsec/catnet-core/branches/develop/protection \
            --method PATCH \
            --field allow_force_pushes=false 2>/dev/null || \
          gh api repos/mendsec/catnet-core/branches/develop/protection \
            --method PUT \
            --field allow_force_pushes=false 2>/dev/null || \
          echo "Warning: could not restore branch protection"
          echo "develop synced to main ($MAIN_SHA)"