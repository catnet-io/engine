name: Sync develop after merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-develop:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop-signed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync develop with main
        run: |
          git checkout develop
          git merge origin/main --no-edit
          git push origin develop