name: Sync develop after merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-develop:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop-signed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync develop with main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAIN_SHA=$(git rev-parse origin/main)
          gh api repos/mendsec/catnet-core/git/refs/heads/develop \
            --method PATCH \
            --field sha="$MAIN_SHA" \
            --field force=true
          echo "develop updated to point to main ($MAIN_SHA)"