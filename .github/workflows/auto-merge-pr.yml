name: Auto Merge PR (develop → main)

# Triggers:
#   - Every push to develop (new commits land)
#   - Manual dispatch from the Actions tab
on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own force-push of signed commits
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for diff between develop and main
        id: diff
        run: |
          DIFF=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          echo "commit_count=$DIFF" >> "$GITHUB_OUTPUT"
          if [ "$DIFF" -eq 0 ]; then
            echo "⚠️  develop is up-to-date with main — nothing to do."
          else
            echo "✅ develop is $DIFF commit(s) ahead of main."
          fi

      - name: Check if commits are already signed
        if: steps.diff.outputs.commit_count != '0'
        id: signing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEEDS_SIGNING=false
          for SHA in $(git rev-list origin/main..origin/develop); do
            VERIFIED=$(gh api "repos/${{ github.repository }}/git/commits/${SHA}" \
              --jq '.verification.verified' 2>/dev/null || echo "false")
            if [ "$VERIFIED" != "true" ]; then
              NEEDS_SIGNING=true
              echo "⚠️  Commit ${SHA:0:7} is NOT signed."
              break
            fi
          done
          echo "needs_signing=$NEEDS_SIGNING" >> "$GITHUB_OUTPUT"
          if [ "$NEEDS_SIGNING" = "false" ]; then
            echo "✅ All commits are already signed — skipping."
          fi

      - name: Import GPG key and sign commits
        if: steps.signing.outputs.needs_signing == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Import the GPG private key
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

          # Get the key ID
          KEY_ID=$(gpg --list-secret-keys --keyid-format long \
            "41898282+github-actions[bot]@users.noreply.github.com" 2>/dev/null \
            | grep -E '^\s+[A-F0-9]+' | head -1 | tr -d ' ')

          echo "🔑 Using GPG key: $KEY_ID"

          # Configure git for signing
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign true
          git config gpg.program gpg

          # Rebase develop onto main and re-sign every commit
          git checkout develop

          # Use rebase --exec to amend and sign each commit
          GIT_COMMITTER_NAME="github-actions[bot]" \
          GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          git rebase origin/main --exec 'git commit --amend --no-edit -S'

          # Verify the signatures locally
          echo ""
          echo "📝 Signed commits:"
          git log --oneline --show-signature origin/main..HEAD 2>&1 | head -60

          # Force push the signed branch
          git push --force origin develop

          echo ""
          echo "✅ All commits signed and pushed."

      - name: Create or update Pull Request
        if: steps.diff.outputs.commit_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open PR from develop → main already exists
          EXISTING_PR=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "ℹ️  PR #$EXISTING_PR already exists — skipping creation."
            exit 0
          fi

          # Build a commit summary for the PR body
          COMMITS=$(git log --oneline origin/main..origin/develop)
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')

          BODY=$(cat <<EOF
          ## Merge develop → main

          Automated PR opened by \`github-actions[bot]\`.

          ### Commits included ($COMMIT_COUNT)

          \`\`\`
          $COMMITS
          \`\`\`

          ### Checklist
          - [x] CI passes on \`develop\`
          - [ ] Code review approved
          - [ ] Ready to merge
          EOF
          )

          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop → main" \
            --body "$BODY"

          echo "✅ Pull Request created successfully."
