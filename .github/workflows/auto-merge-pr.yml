name: Auto Merge PR (develop → main)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check diff
        id: diff
        run: |
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "develop is $COUNT commit(s) ahead of main."

      - name: Create Pull Request
        if: steps.diff.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -B develop origin/develop
          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop → main" \
            --body "Automated PR by github-actions[bot]." \
            --label automated 2>/dev/null || \
            echo "PR already exists, skipping."
