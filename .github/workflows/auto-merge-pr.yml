name: Auto Merge PR (develop → main)

# Triggers:
#   - Every push to develop (new commits land)
#   - Manual dispatch from the Actions tab
on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own force-push of signed commits
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for diff between develop and main
        id: diff
        run: |
          DIFF=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          echo "commit_count=$DIFF" >> "$GITHUB_OUTPUT"
          if [ "$DIFF" -eq 0 ]; then
            echo "⚠️  develop is up-to-date with main — nothing to do."
          else
            echo "✅ develop is $DIFF commit(s) ahead of main."
          fi

      - name: Check if commits need signing
        if: steps.diff.outputs.commit_count != '0'
        id: signing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEEDS_SIGNING=false
          for SHA in $(git rev-list origin/main..origin/develop); do
            VERIFIED=$(gh api "repos/${{ github.repository }}/git/commits/${SHA}" \
              --jq '.verification.verified' 2>/dev/null || echo "false")
            if [ "$VERIFIED" != "true" ]; then
              NEEDS_SIGNING=true
              echo "⚠️  Commit ${SHA:0:7} is NOT signed."
              break
            fi
          done
          echo "needs_signing=$NEEDS_SIGNING" >> "$GITHUB_OUTPUT"
          if [ "$NEEDS_SIGNING" = "false" ]; then
            echo "✅ All commits are already signed — skipping."
          fi

      - name: Sign commits with SSH
        if: steps.signing.outputs.needs_signing == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # ── Setup SSH key ──
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # ── Configure git for SSH signing ──
          git config user.name "Fábio Mendes"
          git config user.email "fabiomendesilva@gmail.com"
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/id_rsa
          git config commit.gpgsign true

          # ── Checkout the local develop branch ──
          git checkout develop
          git reset --hard origin/develop

          # ── Determine the commit range to sign ──
          MERGE_BASE=$(git merge-base origin/main develop)
          echo "📌 Merge base: ${MERGE_BASE:0:7}"
          echo "📌 develop HEAD: $(git rev-parse develop | head -c 7)"

          # ── Set committer identity for filter-branch ──
          export GIT_COMMITTER_NAME="Fábio Mendes"
          export GIT_COMMITTER_EMAIL="fabiomendesilva@gmail.com"

          # ── Use filter-branch to re-sign every commit (preserving merge structure) ──
          # --env-filter rewrites author/committer to fabiomendesilva@gmail.com
          # --commit-filter signs each commit with SSH via -S
          FILTER_BRANCH_SQUELCH_WARNING=1 \
          git filter-branch --force \
            --env-filter '
              export GIT_AUTHOR_NAME="Fábio Mendes"
              export GIT_AUTHOR_EMAIL="fabiomendesilva@gmail.com"
              export GIT_COMMITTER_NAME="Fábio Mendes"
              export GIT_COMMITTER_EMAIL="fabiomendesilva@gmail.com"
            ' \
            --commit-filter '
              git commit-tree -S "$@"
            ' \
            "${MERGE_BASE}..develop"

          echo ""
          echo "📝 Develop HEAD after signing: $(git rev-parse develop | head -c 7)"

          # ── Verify signatures locally ──
          echo ""
          echo "📝 Signed commits (G=good, N=none):"
          git log --format="%h %G? %s" "${MERGE_BASE}..develop" | head -30

          # ── Force push the signed branch ──
          git push --force origin develop

          echo ""
          echo "✅ All commits signed and pushed."

      - name: Create or update Pull Request
        if: steps.diff.outputs.commit_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open PR from develop → main already exists
          EXISTING_PR=$(gh pr list \
            --base main \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "ℹ️  PR #$EXISTING_PR already exists — skipping creation."
            exit 0
          fi

          # Build a commit summary for the PR body
          COMMITS=$(git log --oneline origin/main..origin/develop)
          COMMIT_COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')

          BODY=$(cat <<EOF
          ## Merge develop → main

          Automated PR opened by \`github-actions[bot]\`.
          All commits are GPG-signed. ✅

          ### Commits included ($COMMIT_COUNT)

          \`\`\`
          $COMMITS
          \`\`\`

          ### Checklist
          - [x] CI passes on \`develop\`
          - [x] Commits are GPG-signed
          - [ ] Code review approved
          - [ ] Ready to merge
          EOF
          )

          gh pr create \
            --base main \
            --head develop \
            --title "chore: merge develop → main" \
            --body "$BODY"

          echo "✅ Pull Request created successfully."
