name: Govulncheck

on:
  push:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25.x"
          go-package: ./...
          repo-checkout: false
