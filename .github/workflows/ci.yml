name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    name: Build · test · vet
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@304753d07203912d4532c9027068285517173e34 # v5.3.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module integrity
        run: go mod verify

      - name: Verify GitHub Action pinning and versions
        run: |
          # Reject invalid/non-existent major tags
          if grep -r -E "uses:\s*actions/checkout@v[5-9]" .github/workflows/; then
            echo "ERROR: Invalid actions/checkout version found in workflows"
            exit 1
          fi
          if grep -r -E "uses:\s*actions/setup-go@v[6-9]" .github/workflows/; then
            echo "ERROR: Invalid actions/setup-go version found in workflows"
            exit 1
          fi
          echo "✓ All GitHub Action versions are valid"

      - name: Check no local replace directives
        run: |
          if grep -P "^replace\s+\S+\s+=>\s+\.\." go.mod 2>/dev/null; then
            echo "ERROR: Local replace directive found in go.mod"
            exit 1
          fi
          echo "✓ No local replace directives"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race detector)
        run: go test -race -coverprofile=coverage.out ./...